{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <center>

        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card">
                        <div class="card-header text-center bg-primary text-white">
                            <h3>Create Product</h3>
                        </div>
                        <div class="card-body">
                            <form action="" method="POST" enctype="multipart/form-data">
                                {% csrf_token %}

                                <div class="mb-3 row">
                                    <label for="" class="col-sm-3 col-form-label">Product Name</label>
                                    <div class="col-9">
                                        {{form.product_name}}

                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label for="" class="col-sm-3 col-form-label">Product Code</label>
                                    <div class="col-sm-9">
                                        {{form.product_code}}
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label for="" class="col-sm-3 col-form-label">Description</label>
                                    <div class="col-sm-9">{{form.product_description}}</div>
                                </div>

                                <div class="mb-3 row">
                                    <label for="" class="col-sm-3 col-form-label">Price</label>
                                    <div class="col-sm-9">{{form.product_price}}</div>
                                </div>

                                <div class="mb-3 row">
                                    <label for="" class="col-sm-3 col-form-label">GST</label>
                                    <div class="col-sm-9">{{form.gst_percent}}</div>
                                </div>

                                <div class="mb-3 row">
                                    <label for="" class="col-sm-3 col-form-label">Stock</label>
                                    <div class="col-sm-9">{{form.stock_quantity}}</div>
                                </div>

                                <div class="mb-3 row">
                                    <label for="" class="col-sm-3 col-form-label">Image</label>
                                    <div class="col-sm-9">{{form.product_image}}</div>
                                </div>








                                <button class="btn btn-success ps-4 pe-4">submit</button>
                            </form>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </center>

</body>

</html>
