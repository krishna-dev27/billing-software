{% extends 'inventory/dummy.html' %}
{% block title %}
    <title>Generate Bill</title>
{% endblock %}
{% block content %}
<center>
    <table style="width: 60%;" class="table table-striped-columns mt-3">
    <tr>
        <th>Bill no</th>
        <th>Customer Name</th>
        <th>Date</th>
        <th>Total Amount</th>
        <th>GST Amount</th>
        <th>Grand Total</th>
    </tr>



<tr>
    <td>{{IO.id}}</td>
    <td>{{IO.customer.customer_name}}</td>
    <td>{{IO.date}}</td>
    <td>{{IO.total_amount}}</td>
    <td>{{IO.gst_amount}}</td>
    <td>{{IO.grand_total}}</td>
</tr>

</table>
</center>
{% endblock %}
